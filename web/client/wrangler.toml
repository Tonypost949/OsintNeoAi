# Cloudflare Pages Deployment Configuration
# OSINT Neo AI - Recon Map

name = "osint-neo-ai-recon"
compatibility_date = "2026-07-22"

[build]
  command = "cd web/client && npm install && npm run build"
  output = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_FRONTEND_FORGE_API_KEY = "${VITE_FRONTEND_FORGE_API_KEY}"

# Redirects for SPA
[[redirects]]
  from = "/recon-map"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/analysis/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

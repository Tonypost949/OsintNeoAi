version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: osint-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osint}
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint} -d ${POSTGRES_DB:-osint}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - osint-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: osint-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - osint-network

  # Main API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osint-api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-osint}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-osint}
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_FILE=/app/config/production.yaml
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - osint-network

  # Web UI (serves static files)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: osint-web
    ports:
      - "8080:80"
    depends_on:
      - api
    volumes:
      - ./web/static:/usr/share/nginx/html:ro
      - ./web/templates:/etc/nginx/templates:ro
    restart: unless-stopped
    networks:
      - osint-network

  # Background Worker for collectors
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: osint-worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-osint}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-osint}
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_FILE=/app/config/production.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      replicas: 2
    restart: unless-stopped
    networks:
      - osint-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: osint-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - osint-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: osint-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - osint-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  osint-network:
    driver: bridge
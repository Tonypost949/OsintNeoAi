# Default configuration for OSINT Independent Platform
# Copy to config/local.yaml and customize

database:
  type: sqlite
  path: data/osint.db
  # For PostgreSQL:
  # type: postgresql
  # host: localhost
  # port: 5432
  # database: osint
  # username: osint_user
  # password: ${OSINT_DB_PASSWORD}
  pool_size: 10
  max_overflow: 20
  echo: false

api:
  host: 0.0.0.0
  port: 8000
  workers: 4
  timeout: 30
  cors_origins:
    - "*"
  rate_limit: 100
  rate_limit_window: 60
  auth_enabled: true
  jwt_secret: ${OSINT_JWT_SECRET}
  jwt_algorithm: HS256
  jwt_expiration: 3600
  api_key_header: X-API-Key

collectors:
  timeout: 30
  max_retries: 3
  retry_delay: 1.0
  user_agent: "OSINT-Independent/1.0"
  proxy: ""
  verify_ssl: true
  max_concurrent: 10
  rate_limit: 60
  rate_limit_window: 60
  api_keys:
    shodan: ${OSINT_SHODAN_KEY}
    virustotal: ${OSINT_VT_KEY}
    censys_id: ${OSINT_CENSYS_ID}
    censys_secret: ${OSINT_CENSYS_SECRET}
    securitytrails: ${OSINT_SECURITYTRAILS_KEY}
    hunter: ${OSINT_HUNTER_KEY}
    github: ${OSINT_GITHUB_TOKEN}
    twitter_bearer: ${OSINT_TWITTER_BEARER}
    reddit_client_id: ${OSINT_REDDIT_CLIENT_ID}
    reddit_client_secret: ${OSINT_REDDIT_CLIENT_SECRET}

enrichers:
  timeout: 30
  max_retries: 3
  cache_ttl: 3600

logging:
  level: INFO
  format: json
  file: logs/osint.log
  max_size: 10485760
  backup_count: 5
  console: true

storage:
  type: sqlite
  path: data

web:
  host: 0.0.0.0
  port: 8080
  debug: false
  secret_key: ${OSINT_WEB_SECRET}
  session_timeout: 3600
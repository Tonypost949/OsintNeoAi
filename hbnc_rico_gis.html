  if(!q||q.length<2) return;
  const matches = allSearchable.filter(i=>(i.name+i.desc+i.type).toLowerCase().includes(q)).slice(0,15);
  matches.forEach(m=>{
    const d=document.createElement('div');
    d.innerHTML=`<b>${m.type}</b> ${m.name}<br><small>${m.desc.substring(0,80)}</small>`;
    d.onclick=()=>{map.setView([m.lat,m.lng],m.type==='PARCEL'?19:15);document.getElementById('search').classList.remove('show');};
    results.appendChild(d);
  });
}

// === MAP INTERACTION ===
map.on('moveend',()=>{
  const center=map.getCenter(),zoom=map.getZoom();
  document.getElementById('coord-readout-main').textContent=`Lat: ${center.lat.toFixed(6)} | Lng: ${center.lng.toFixed(6)} | Zoom: ${zoom}`;
  // Approximate scale
  const metersPerPixel = 156543.03392 * Math.cos(center.lat * Math.PI/180) / Math.pow(2,zoom);
  const barMeters = 100 * metersPerPixel;
  let scaleText;
  if(barMeters>=1000) scaleText=`~${(barMeters/1000).toFixed(1)} km`;
  else scaleText=`~${Math.round(barMeters)} m`;
  document.getElementById('scale-text').textContent=scaleText;
});
map.on('mousemove',e=>{
  document.getElementById('coord-readout').textContent=`Lat: ${e.latlng.lat.toFixed(6)} | Lng: ${e.latlng.lng.toFixed(6)}`;
});

let threatActive=false;
function threatMode(){
  threatActive=!threatActive;
  const color=threatActive?'#f00':'#f44';
  document.querySelectorAll('.leaflet-interactive').forEach(el=>{
    if(el._path&&el._path.classList){el.setAttribute('stroke',color);}
  });
  document.getElementById('hud').innerHTML+=threatActive?'<br><span class="r" style="animation:blink 1s infinite">⚠ THREAT MODE ACTIVE</span>':'';
}

document.addEventListener('keydown',e=>{
  if(e.key==='f'&&e.ctrlKey){e.preventDefault();document.getElementById('search').classList.toggle('show');document.getElementById('search-input').focus();}
  if(e.key==='t'&&e.ctrlKey){e.preventDefault();threatMode();}
  if(e.key==='Escape'){document.getElementById('search').classList.remove('show');}
});
